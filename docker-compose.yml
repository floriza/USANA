# Local development only — uses a local Postgres container.
# For staging/production deployments on Hostinger, use docker-compose.staging.yml
# or docker-compose.prod.yml which connect to Supabase instead.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/usana_store
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - usana_network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: usana_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - usana_network

volumes:
  postgres_data:

networks:
  usana_network:
    driver: bridge
